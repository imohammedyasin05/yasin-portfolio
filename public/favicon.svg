<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect with gradient -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>
  <!-- Letter Y - bold and centered -->
  <text x="16" y="23" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.5">Y</text>
  <!-- Small dot accent -->
  <circle cx="22" cy="10" r="2.5" fill="#60a5fa" opacity="0.8"/>
</svg>
